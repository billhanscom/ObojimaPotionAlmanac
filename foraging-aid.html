<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obojima Potion Toolkit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://use.typekit.net/rke0sfx.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a class="skip-link" href="#foraging-results">Skip to results</a>
    <div class="container">
        <header class="app-header">
            <div class="app-utility-bar" aria-label="Application utilities">
                <div class="inventory-strip">
                    <div class="utility-line">
                        <span class="utility-heading">Inventory</span>
                        <a class="utility-link" href="#foraging-results">View</a>
                        <button type="button" class="utility-link" onclick="clearForagingInventory()">Clear</button>
                        <button type="button" class="utility-link save-inventory-button" onclick="exportInventory()">Save</button>
                        <button type="button" class="utility-link" onclick="importInventory()">Load</button>
                    </div>
                    <div class="current-inventory-line">
                        <span class="utility-heading small">Current</span>
                        <span id="inventory-profile" class="inventory-profile" aria-live="polite"></span>
                    </div>
                </div>

                <div class="preference-strip">
                    <div class="values-control">
                        <span class="utility-heading">Values</span>
                        <button type="button" class="utility-link values-toggle-button value-choice value-2024" data-year="2024" onclick="setValuesYearChoice('2024')">2024</button>
                        <button type="button" class="utility-link values-toggle-button value-choice value-2014" data-year="2014" onclick="setValuesYearChoice('2014')">2014</button>
                    </div>
                    <div class="contrast-control">
                        <button type="button" id="high-contrast-toggle" class="utility-link contrast-toggle-button" aria-pressed="false" aria-label="Turn on high contrast mode" title="Turn on high contrast">◐</button>
                        <span class="hc-state hc-on">ON</span>
                        <span class="hc-state hc-off">OFF</span>
                    </div>
                </div>
            </div>

            <h1>Obojima Potions Toolkit</h1>
            <nav class="toolkit-nav" aria-label="Toolkit navigation">
                <a class="toolkit-nav-link" href="index.html">Potion Almanac</a>
                <a class="toolkit-nav-link" href="ingredient-finder.html">Ingredient Finder</a>
                <a class="toolkit-nav-link active" href="foraging-aid.html">Forager’s Aid</a>
            </nav>
            <p class="tool-description">Generate plausible ingredient finds after a foraging check.</p>
        </header>

        <div class="button-group top-button-group">
            <div class="primary-button-row">
                <button type="button" class="primary-action-button" onclick="generateForagingFinds()">Generate Finds</button>
            </div>
        </div>

        <section class="foraging-controls" aria-label="Foraging inputs">
            <div class="control-group">
                <label for="foraging-region">Region</label>
                <select id="foraging-region"></select>
            </div>
            <div class="control-group">
                <label for="foraging-search-area">Where are they searching?</label>
                <select id="foraging-search-area"></select>
            </div>
            <div class="control-group">
                <label for="foraging-dc">DC</label>
                <input id="foraging-dc" type="number" min="1" max="30" value="15">
            </div>
            <div class="control-group">
                <label for="foraging-roll">Roll Total</label>
                <input id="foraging-roll" type="number" min="1" max="40" value="15">
            </div>
        </section>

        <section class="foraging-options" aria-label="Foraging options">
            <label class="checkbox-option">
                <input id="foraging-prioritize-new" type="checkbox" checked>
                Prioritize undiscovered ingredients
            </label>
            <label class="checkbox-option">
                <input id="foraging-debug" type="checkbox">
                Show generation details
            </label>
        </section>

        <h2 class="sr-only">Foraging Results</h2>
        <section id="foraging-results" aria-live="polite" role="region" aria-label="Foraging results"></section>

        <footer class="site-footer">
            <p>Created by Urameshiya</p>
            <p><a href="https://discord.gg/ZfdtQeAqV" target="_blank" rel="noopener noreferrer">Report any errors on the Obojima Discord server.</a></p>
        </footer>
    </div>

    <script src="js/common.js"></script>
    <script src="js/accessibility.js"></script>
    <script src="js/foraging-aid.js"></script>
</body>
</html>
